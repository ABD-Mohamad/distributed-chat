name: Publish Docker Images

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: auth-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nexuschat-auth:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push chat-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: chat-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nexuschat-chat:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push event-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: event-service/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nexuschat-event:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: gateway/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nexuschat-gateway:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push load-balancer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: load-balancer/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/nexuschat-load-balancer:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
