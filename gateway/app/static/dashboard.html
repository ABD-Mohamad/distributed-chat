<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusChat — Dashboard</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="background:var(--gray-100);min-height:100vh">
  <div class="dashboard-page">
    <h1>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
      Load Balancer Dashboard
      <span style="font-size:12px;color:var(--gray-400);font-weight:400">Auto-refreshes every 5s</span>
    </h1>

    <div class="strategy-selector">
      <span style="font-size:13px;color:var(--gray-600)">Active Strategy:</span>
      <strong id="activeStrategy" style="color:var(--primary)">---</strong>
      <select id="strategySelect" onchange="switchStrategy()"></select>
    </div>

    <div class="dashboard-grid">
      <div class="stat-card">
        <div class="stat-label">Backends</div>
        <div class="stat-value" id="statBackends">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Circuit Breakers</div>
        <div class="stat-value green" id="statCircuitBreakers">All Closed</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Avg Latency</div>
        <div class="stat-value green" id="statLatency">0 ms</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value" id="statRequests">0</div>
      </div>
    </div>

    <div class="backend-table">
      <table>
        <thead>
          <tr>
            <th>Backend</th>
            <th>Active</th>
            <th>Latency</th>
            <th>Error Rate</th>
            <th>Requests</th>
            <th>Circuit Breaker</th>
          </tr>
        </thead>
        <tbody id="backendsBody">
          <tr><td colspan="6" style="text-align:center;padding:24px;color:var(--gray-400)">Loading...</td></tr>
        </tbody>
      </table>
    </div>

    <p style="text-align:center;margin-top:24px;font-size:12px;color:var(--gray-400)">
      <a href="/" style="color:var(--gray-400)">Chat</a>
      &middot;
      <a href="/admin" style="color:var(--gray-400)">Admin</a>
      &middot;
      <a href="http://localhost:16686" target="_blank" style="color:var(--gray-400)">Jaeger Traces</a>
    </p>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/dashboard.js"></script>
</body>
</html>
