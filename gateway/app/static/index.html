<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexusChat</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #f0f2f5; height: 100vh; }
  .hidden { display: none !important; }
  #app { display: flex; height: 100vh; }
  #sidebar { width: 300px; background: #fff; border-right: 1px solid #ddd; display: flex; flex-direction: column; }
  #sidebar-header { padding: 16px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; }
  #sidebar-header h2 { font-size: 16px; }
  #chat-list { flex: 1; overflow-y: auto; padding: 8px; }
  .chat-item { padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; }
  .chat-item:hover { background: #f0f2f5; }
  .chat-item.active { background: #e3f2fd; }
  #main { flex: 1; display: flex; flex-direction: column; }
  #main-placeholder { flex: 1; display: flex; align-items: center; justify-content: center; color: #888; }
  #chat-header { padding: 16px; border-bottom: 1px solid #ddd; background: #fff; font-weight: 600; }
  #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 70%; padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.4; }
  .msg.own { align-self: flex-end; background: #0084ff; color: #fff; border-bottom-right-radius: 4px; }
  .msg.other { align-self: flex-start; background: #e4e6eb; border-bottom-left-radius: 4px; }
  .msg .sender { font-size: 11px; font-weight: 600; margin-bottom: 2px; }
  .msg.own .sender { color: rgba(255,255,255,0.8); }
  .msg .time { font-size: 10px; color: #888; text-align: right; margin-top: 2px; }
  .msg.own .time { color: rgba(255,255,255,0.7); }
  #input-area { padding: 12px 16px; background: #fff; border-top: 1px solid #ddd; display: flex; gap: 8px; }
  #input-area input { flex: 1; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; }
  #input-area input:focus { border-color: #0084ff; }
  #input-area button { padding: 10px 20px; border: none; border-radius: 20px; background: #0084ff; color: #fff; cursor: pointer; font-size: 14px; }
  #input-area button:hover { background: #0073e6; }
  #auth { display: flex; align-items: center; justify-content: center; height: 100vh; }
  #auth-box { background: #fff; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 360px; }
  #auth-box h1 { text-align: center; margin-bottom: 24px; font-size: 24px; }
  #auth-box input { width: 100%; padding: 10px 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  #auth-box input:focus { border-color: #0084ff; outline: none; }
  #auth-box button { width: 100%; padding: 10px; border: none; border-radius: 8px; background: #0084ff; color: #fff; font-size: 14px; cursor: pointer; }
  #auth-box button:hover { background: #0073e6; }
  #auth-box .toggle { text-align: center; margin-top: 12px; color: #0084ff; cursor: pointer; font-size: 13px; }
  #auth-box .error { color: #e74c3c; font-size: 13px; margin-bottom: 8px; text-align: center; }
  #new-chat-form { padding: 12px 16px; border-bottom: 1px solid #ddd; display: flex; gap: 8px; }
  #new-chat-form input { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 13px; }
  #new-chat-form button { padding: 8px 12px; border: none; border-radius: 8px; background: #0084ff; color: #fff; cursor: pointer; font-size: 13px; }
  #user-info { display: flex; align-items: center; gap: 8px; }
  #username-display { font-size: 13px; color: #555; }
  #logout-btn { padding: 4px 8px; border: 1px solid #ddd; border-radius: 4px; background: #fff; cursor: pointer; font-size: 12px; }
</style>
</head>
<body>
<div id="auth">
  <div id="auth-box">
    <h1>NexusChat</h1>
    <div id="auth-error" class="error"></div>
    <input id="auth-username" placeholder="Username" autocomplete="off">
    <input id="auth-password" type="password" placeholder="Password">
    <button id="auth-btn">Register</button>
    <div class="toggle" id="auth-toggle">Already have an account? Log in</div>
  </div>
</div>

<div id="app" class="hidden">
  <div id="sidebar">
    <div id="sidebar-header">
      <h2>Chats</h2>
      <div id="user-info">
        <span id="username-display"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </div>
    <div id="new-chat-form">
      <input id="new-chat-name" placeholder="New chat name">
      <button id="create-chat-btn">Create</button>
    </div>
    <div id="chat-list"></div>
  </div>
  <div id="main">
    <div id="main-placeholder">Select a chat to start messaging</div>
    <div id="chat-header" class="hidden"></div>
    <div id="messages" class="hidden"></div>
    <div id="input-area" class="hidden">
      <input id="msg-input" placeholder="Type a message...">
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script>
const API = `http://${location.hostname}:8080/api`;
const WS = `ws://${location.hostname}:8080/api`;

let token = localStorage.getItem("token");
let currentUser = null;
let currentChatId = null;
let ws = null;
let chats = {};

function showAuth() { document.getElementById("auth").classList.remove("hidden"); document.getElementById("app").classList.add("hidden"); }
function showApp() { document.getElementById("auth").classList.add("hidden"); document.getElementById("app").classList.remove("hidden"); }

if (token) { showApp(); loadChats(); }

document.getElementById("auth-toggle").addEventListener("click", () => {
  const btn = document.getElementById("auth-btn");
  const toggle = document.getElementById("auth-toggle");
  const isRegister = btn.textContent === "Register";
  btn.textContent = isRegister ? "Log In" : "Register";
  toggle.textContent = isRegister ? "Don't have an account? Register" : "Already have an account? Log in";
});

document.getElementById("auth-btn").addEventListener("click", async () => {
  const username = document.getElementById("auth-username").value.trim();
  const password = document.getElementById("auth-password").value;
  const isRegister = document.getElementById("auth-btn").textContent === "Register";
  const endpoint = isRegister ? "/auth/register" : "/auth/login";
  const errEl = document.getElementById("auth-error");
  errEl.textContent = "";
  if (!username || !password) { errEl.textContent = "Please fill in all fields"; return; }
  try {
    const res = await fetch(`${API}${endpoint}`, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({username, password}),
    });
    const data = await res.json();
    if (!res.ok) { errEl.textContent = data.detail || "Error"; return; }
    token = data.access_token;
    localStorage.setItem("token", token);
    currentUser = username;
    showApp();
    loadChats();
  } catch (e) { errEl.textContent = "Connection error"; }
});

document.getElementById("logout-btn").addEventListener("click", () => {
  token = null; currentUser = null; currentChatId = null;
  localStorage.removeItem("token");
  if (ws) { ws.close(); ws = null; }
  showAuth();
});

document.getElementById("create-chat-btn").addEventListener("click", async () => {
  const name = document.getElementById("new-chat-name").value.trim();
  if (!name) return;
  try {
    const res = await fetch(`${API}/chats`, {
      method: "POST", headers: {"Content-Type": "application/json", "Authorization": `Bearer ${token}`},
      body: JSON.stringify({name}),
    });
    if (!res.ok) return;
    const chat = await res.json();
    document.getElementById("new-chat-name").value = "";
    loadChats();
    selectChat(chat.id);
  } catch (e) {}
});

async function loadChats() {
  try {
    const res = await fetch(`${API}/chats`, { headers: {"Authorization": `Bearer ${token}`} });
    if (!res.ok) { if (res.status === 401) { showAuth(); } return; }
    const list = await res.json();
    const container = document.getElementById("chat-list");
    container.innerHTML = "";
    chats = {};
    for (const c of list) {
      chats[c.id] = c;
      const el = document.createElement("div");
      el.className = "chat-item" + (c.id === currentChatId ? " active" : "");
      el.textContent = c.name;
      el.dataset.id = c.id;
      el.addEventListener("click", () => selectChat(c.id));
      container.appendChild(el);
    }
  } catch (e) {}
}

async function selectChat(chatId) {
  if (ws) { ws.close(); ws = null; }
  currentChatId = chatId;
  document.querySelectorAll(".chat-item").forEach(el => el.classList.toggle("active", el.dataset.id === chatId));
  const chat = chats[chatId];
  document.getElementById("chat-header").textContent = chat ? chat.name : "";
  document.getElementById("chat-header").classList.remove("hidden");
  document.getElementById("main-placeholder").classList.add("hidden");
  document.getElementById("messages").classList.remove("hidden");
  document.getElementById("input-area").classList.remove("hidden");
  document.getElementById("messages").innerHTML = "";
  document.getElementById("msg-input").value = "";
  // Load history
  try {
    const res = await fetch(`${API}/chats/${chatId}/messages`, { headers: {"Authorization": `Bearer ${token}`} });
    if (res.ok) {
      const msgs = await res.json();
      for (const m of msgs) appendMessage(m, false);
      scrollToBottom();
    }
  } catch (e) {}
  // Connect WebSocket
  connectWs(chatId);
}

function connectWs(chatId) {
  ws = new WebSocket(`${WS}/ws/${chatId}?token=${token}`);
  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);
    if (data.chat_id === currentChatId) { appendMessage(data, true); scrollToBottom(); }
  };
  ws.onclose = () => { if (currentChatId === chatId) setTimeout(() => connectWs(chatId), 1000); };
}

function appendMessage(m, isNew) {
  const container = document.getElementById("messages");
  const el = document.createElement("div");
  const isOwn = m.sender_id === getUserFromToken();
  el.className = `msg ${isOwn ? "own" : "other"}`;
  const time = new Date(m.sent_at).toLocaleTimeString([], {hour: "2-digit", minute: "2-digit"});
  el.innerHTML = `<div class="sender">${isOwn ? "You" : m.sender_username}</div>${escapeHtml(m.body)}<div class="time">${time}</div>`;
  container.appendChild(el);
}

function getUserFromToken() {
  if (!token) return null;
  try { return JSON.parse(atob(token.split(".")[1])).sub; } catch { return null; }
}

function scrollToBottom() {
  const el = document.getElementById("messages");
  el.scrollTop = el.scrollHeight;
}

document.getElementById("send-btn").addEventListener("click", sendMessage);
document.getElementById("msg-input").addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

function sendMessage() {
  const input = document.getElementById("msg-input");
  const body = input.value.trim();
  if (!body || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({body}));
  input.value = "";
}

function escapeHtml(text) {
  const d = document.createElement("div");
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
