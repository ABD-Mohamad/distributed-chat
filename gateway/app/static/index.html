<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusChat — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <h1>NexusChat</h1>
      <p class="subtitle">Distributed real-time messaging platform</p>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Log In</button>
        <button class="auth-tab" data-tab="register">Register</button>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="authForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="Enter your username" required minlength="3" maxlength="50">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" placeholder="Enter your password" required minlength="6">
        </div>
        <button type="submit" class="btn btn-primary" id="authSubmit">Log In</button>
      </form>

      <p style="text-align:center;margin-top:20px;font-size:12px;color:var(--gray-400)">
        <a href="/dashboard" style="color:var(--gray-400)">Dashboard</a>
        &middot;
        <a href="/admin" style="color:var(--gray-400)">Admin</a>
      </p>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script>
    const tabs = document.querySelectorAll(".auth-tab");
    const submitBtn = document.getElementById("authSubmit");
    const errorMsg = document.getElementById("errorMsg");
    const form = document.getElementById("authForm");

    let mode = "login";

    if (getToken()) {
      window.location.href = "/chat";
    }

    tabs.forEach(t => {
      t.addEventListener("click", () => {
        tabs.forEach(x => x.classList.remove("active"));
        t.classList.add("active");
        mode = t.dataset.tab;
        submitBtn.textContent = mode === "login" ? "Log In" : "Register";
        errorMsg.classList.remove("show");
      });
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorMsg.classList.remove("show");
      submitBtn.disabled = true;
      submitBtn.textContent = "Please wait...";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      try {
        const endpoint = mode === "login" ? "/login" : "/register";
        const data = await api("POST", endpoint, { username, password });
        if (!data) {
          showError("Invalid credentials. Please try again.");
          return;
        }
        if (data.access_token) {
          setToken(data.access_token);
          const payload = parseJwt(data.access_token);
          if (payload && payload.sub) {
            setUser({ id: payload.sub });
          }
          window.location.href = "/chat";
        } else if (data.detail) {
          showError(data.detail);
        } else {
          showError("Something went wrong. Please try again.");
        }
      } catch (err) {
        showError("Network error. Is the server running?");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = mode === "login" ? "Log In" : "Register";
      }
    });

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.add("show");
    }
  </script>
</body>
</html>
