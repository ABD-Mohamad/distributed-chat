<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NexusChat — Admin</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body style="background:var(--gray-100);min-height:100vh">
  <div class="admin-page">
    <h1>
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Admin Panel
      <span style="font-size:12px;color:var(--gray-400);font-weight:400">Auto-refreshes every 5s</span>
    </h1>

    <div class="admin-grid">
      <div class="admin-card">
        <h3>Events</h3>
        <p style="font-size:24px;font-weight:700;color:var(--primary)" id="eventCount">0</p>
        <p style="font-size:12px;color:var(--gray-500)">Total events consumed from Kafka</p>
      </div>
      <div class="admin-card">
        <h3>Quick Links</h3>
        <div style="display:flex;flex-direction:column;gap:8px;font-size:13px">
          <a href="/" style="color:var(--primary)">Chat</a>
          <a href="/dashboard" style="color:var(--primary)">Load Balancer Dashboard</a>
          <a href="http://localhost:16686" target="_blank" style="color:var(--primary)">Jaeger Tracing</a>
          <a href="http://localhost:15672" target="_blank" style="color:var(--primary)">RabbitMQ Management</a>
          <a href="/docs" style="color:var(--primary)">API Documentation</a>
        </div>
      </div>
    </div>

    <div class="admin-card" style="margin-bottom:20px">
      <h3>Event Log</h3>
      <table class="event-table">
        <thead>
          <tr>
            <th>Type</th>
            <th>Payload</th>
            <th>Topic</th>
            <th>Offset</th>
            <th>Time</th>
          </tr>
        </thead>
        <tbody id="eventsBody">
          <tr><td colspan="5" style="text-align:center;padding:24px;color:var(--gray-400)">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="/static/js/api.js"></script>
  <script src="/static/js/admin.js"></script>
</body>
</html>
